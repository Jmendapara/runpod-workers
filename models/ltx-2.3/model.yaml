name: ltx-2.3

custom_nodes:
  - repo: https://github.com/Lightricks/ComfyUI-LTXVideo
    # kornia >= 0.8 removed the `pad` symbol from kornia.geometry.transform.pyramid;
    # ComfyUI-LTXVideo/pyramid_blending.py still imports it, so the whole package
    # fails to load and all of its nodes (LTXVAddLatentGuide, LTXVCropGuides, etc.)
    # never get registered. Pin to the last compatible kornia line.
    extra_pip:
      - "kornia<0.8"
  - repo: https://github.com/kijai/ComfyUI-KJNodes
  - repo: https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite
  - repo: https://github.com/city96/ComfyUI-GGUF
  - repo: https://github.com/kijai/ComfyUI-WanVideoWrapper

pip_extras:
  - sageattention

model_downloads:
  # ----- "Create video" / "Animate Image" workflow's legacy set -----
  # The T2V / I2V (and Eros routing) builders in server/models/ltx-2-3.js
  # reference ltx-2.3-22b-dev.safetensors as the base checkpoint and apply
  # ltx-2.3-22b-distilled-lora-384.safetensors on top at strength 0.5
  # (the "dev + distilled-lora" pattern). Both checkpoints are baked so the
  # legacy workflows continue to behave identically to the standalone
  # ltx-video-runpod-worker image they replace.
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-dev.safetensors
    dest: /comfyui/models/checkpoints/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-distilled.safetensors
    dest: /comfyui/models/checkpoints/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-distilled-lora-384.safetensors
    dest: /comfyui/models/loras/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-spatial-upscaler-x2-1.0.safetensors
    dest: /comfyui/models/latent_upscale_models/
  - source: hf
    repo_id: Comfy-Org/ltx-2
    filename: split_files/text_encoders/gemma_3_12B_it_fp4_mixed.safetensors
    dest: /comfyui/models/text_encoders/

  # ----- V2V Extend workflow's set -----
  - source: hf
    repo_id: Comfy-Org/ltx-2
    filename: split_files/text_encoders/gemma_3_12B_it_fp8_scaled.safetensors
    dest: /comfyui/models/text_encoders/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-spatial-upscaler-x2-1.1.safetensors
    dest: /comfyui/models/latent_upscale_models/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: diffusion_models/ltx-2.3-22b-distilled_transformer_only_fp8_scaled.safetensors
    dest: /comfyui/models/unet/LTXVideo/v2/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: text_encoders/ltx-2.3_text_projection_bf16.safetensors
    dest: /comfyui/models/text_encoders/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/LTX23_video_vae_bf16.safetensors
    dest: /comfyui/models/vae/
    rename: LTX23_video_vae_bf16_KJ.safetensors
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/LTX23_audio_vae_bf16.safetensors
    dest: /comfyui/models/vae/
    rename: LTX23_audio_vae_bf16_KJ.safetensors
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/taeltx2_3.safetensors
    # Workflow's VAELoader (node 473) references "vae_approx\\taeltx2_3.safetensors"
    # — i.e. a `vae_approx` subdir of /comfyui/models/vae/. The top-level
    # /comfyui/models/vae_approx/ dir is not enumerated by VAELoader on recent
    # ComfyUI builds, so place the file as a subdir of vae/ instead.
    dest: /comfyui/models/vae/vae_approx/

output:
  # Includes "gifs" because the Extend Video workflow's VHS_VideoCombine nodes
  # (578/627) emit MP4 under ComfyUI's legacy "gifs" output key. Without this,
  # the worker logs "Node 578 produced unhandled keys: ['gifs']" and returns
  # only {status} with no video. The non-extend workflows use SaveVideo which
  # emits under "videos" — still covered.
  type: image+video+gifs
  # VHS_VideoCombine writes both a silent <prefix>.mp4 and an <prefix>-audio.mp4
  # sidecar. With this flag set, the harvester keeps only the audio variant when
  # one exists — otherwise the client would receive two near-duplicate URLs.
  vhs_sidecar_filter: true
