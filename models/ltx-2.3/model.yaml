name: ltx-2.3

custom_nodes:
  - repo: https://github.com/Lightricks/ComfyUI-LTXVideo
    # kornia >= 0.8 removed the `pad` symbol from kornia.geometry.transform.pyramid;
    # ComfyUI-LTXVideo/pyramid_blending.py still imports it, so the whole package
    # fails to load and all of its nodes (LTXVAddLatentGuide, LTXVCropGuides, etc.)
    # never get registered. Pin to the last compatible kornia line.
    extra_pip:
      - "kornia<0.8"
  - repo: https://github.com/kijai/ComfyUI-KJNodes
  - repo: https://github.com/Kosinkadink/ComfyUI-VideoHelperSuite
  - repo: https://github.com/city96/ComfyUI-GGUF
  - repo: https://github.com/kijai/ComfyUI-WanVideoWrapper

  # ----- LipDub workflow set (workflows/lipdub.api.json) -----
  # All three are small personal repos, so pin to reviewed SHAs.
  # FL_ChatterboxVC: converts the LTX-generated speech into the original
  # speaker's voice (target = the input video's audio track).
  - repo: https://github.com/filliptm/ComfyUI_Fill-ChatterBox
    ref: 596850bc61665e9318914841b41ee4154253f020
  # "Apply Whisper": transcribes the input video's speech. Its requirements.txt
  # lists the PyPI `uuid` package, which installs a Python-2-era uuid.py that
  # shadows the stdlib module for the whole venv (the handler imports uuid) —
  # so skip it and install the real deps directly.
  - repo: https://github.com/yuvraj108c/ComfyUI-Whisper
    ref: 006a709848259ed3d69e2f9fcfd7a75f6c860ddd
    pip_install_requirements: false
    extra_pip:
      - openai-whisper
      - pillow
      - soundfile
  # "TranslationNode": offline M2M-100 translation of the transcript into the
  # target language. transformers/torch already ship in the base image; its
  # requirements.txt would try to reinstall torch, so curate here too.
  - repo: https://github.com/petr-pr/ComfyUI-TranslationNode
    ref: aa8fb5ef67d31db44d6b73373f0253c6634fe87d
    pip_install_requirements: false
    extra_pip:
      - langdetect
      - sentencepiece

pip_extras:
  - sageattention

model_downloads:
  # ----- "Create video" / "Animate Image" workflow's legacy set -----
  # The T2V / I2V (and Eros routing) builders in server/models/ltx-2-3.js
  # reference ltx-2.3-22b-dev.safetensors as the base checkpoint and apply
  # ltx-2.3-22b-distilled-lora-384.safetensors on top at strength 0.5
  # (the "dev + distilled-lora" pattern). Both checkpoints are baked so the
  # legacy workflows continue to behave identically to the standalone
  # ltx-video-runpod-worker image they replace.
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-dev.safetensors
    dest: /comfyui/models/checkpoints/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-distilled.safetensors
    dest: /comfyui/models/checkpoints/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-distilled-lora-384.safetensors
    dest: /comfyui/models/loras/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-spatial-upscaler-x2-1.0.safetensors
    dest: /comfyui/models/latent_upscale_models/
  - source: hf
    repo_id: Comfy-Org/ltx-2
    filename: split_files/text_encoders/gemma_3_12B_it_fp4_mixed.safetensors
    dest: /comfyui/models/text_encoders/

  # ----- V2V Extend workflow's set -----
  - source: hf
    repo_id: Comfy-Org/ltx-2
    filename: split_files/text_encoders/gemma_3_12B_it_fp8_scaled.safetensors
    dest: /comfyui/models/text_encoders/
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-spatial-upscaler-x2-1.1.safetensors
    dest: /comfyui/models/latent_upscale_models/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: diffusion_models/ltx-2.3-22b-distilled_transformer_only_fp8_scaled.safetensors
    dest: /comfyui/models/unet/LTXVideo/v2/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: text_encoders/ltx-2.3_text_projection_bf16.safetensors
    dest: /comfyui/models/text_encoders/
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/LTX23_video_vae_bf16.safetensors
    dest: /comfyui/models/vae/
    rename: LTX23_video_vae_bf16_KJ.safetensors
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/LTX23_audio_vae_bf16.safetensors
    dest: /comfyui/models/vae/
    rename: LTX23_audio_vae_bf16_KJ.safetensors
  - source: hf
    repo_id: Kijai/LTX2.3_comfy
    filename: vae/taeltx2_3.safetensors
    # Workflow's VAELoader (node 473) references "vae_approx\\taeltx2_3.safetensors"
    # — i.e. a `vae_approx` subdir of /comfyui/models/vae/. The top-level
    # /comfyui/models/vae_approx/ dir is not enumerated by VAELoader on recent
    # ComfyUI builds, so place the file as a subdir of vae/ instead.
    dest: /comfyui/models/vae/vae_approx/

  # ----- LipDub workflow's set (workflows/lipdub.api.json) -----
  # The lipdub workflow pins the -1.1 revision of the distilled lora (the legacy
  # set above bakes the 1.0 "-384" file under a different name, so both coexist).
  - source: hf
    repo_id: Lightricks/LTX-2.3
    filename: ltx-2.3-22b-distilled-lora-384-1.1.safetensors
    dest: /comfyui/models/loras/
  - source: hf
    repo_id: Lightricks/LTX-2.3-22b-IC-LoRA-LipDub
    filename: ltx-2.3-22b-ic-lora-lipdub-0.9.safetensors
    dest: /comfyui/models/loras/
  # Chatterbox VC weights. load_vc_model() in Fill-ChatterBox's chatterbox_node.py
  # requires exactly s3gen.pt + conds.pt under <models>/chatterbox/chatterbox_vc/
  # and hits HuggingFace at request time when they're missing — bake them.
  - source: hf
    repo_id: ResembleAI/chatterbox
    filename: s3gen.pt
    dest: /comfyui/models/chatterbox/chatterbox_vc/
  - source: hf
    repo_id: ResembleAI/chatterbox
    filename: conds.pt
    dest: /comfyui/models/chatterbox/chatterbox_vc/
  # Whisper weights for "Apply Whisper". With no stt/whisper key in
  # extra_model_paths.yaml the node falls back to <models_dir>/stt/whisper and
  # otherwise downloads from this same URL at request time.
  - source: url
    url: https://openaipublic.azureedge.net/main/whisper/models/aff26ae408abcba5fbf8813c21e62b0941638c5f6eebfb145be0c9839262a19a/large-v3-turbo.pt
    filename: large-v3-turbo.pt
    dest: /comfyui/models/stt/whisper/
  # M2M-100 418M for TranslationNode, as individual files — a full snapshot
  # would also pull the 1.9 GB rust_model.ot the node never loads. The node
  # resolves this dir relative to the process CWD; see patches/symlink-models.py.
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: config.json
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: generation_config.json
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: pytorch_model.bin
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: sentencepiece.bpe.model
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: special_tokens_map.json
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: tokenizer_config.json
    dest: /comfyui/models/translation/facebook/m2m100_418M/
  - source: hf
    repo_id: facebook/m2m100_418M
    filename: vocab.json
    dest: /comfyui/models/translation/facebook/m2m100_418M/

post_install:
  # TranslationNode resolves its model dir relative to the process CWD
  # ("models/translation/..."), and the container launches ComfyUI with CWD=/
  # (base/Dockerfile ends with WORKDIR /). Symlink /models -> /comfyui/models so
  # the baked weights above are found either way.
  - patches/symlink-models.py

output:
  # Includes "gifs" because the Extend Video workflow's VHS_VideoCombine nodes
  # (578/627) emit MP4 under ComfyUI's legacy "gifs" output key. Without this,
  # the worker logs "Node 578 produced unhandled keys: ['gifs']" and returns
  # only {status} with no video. The non-extend workflows use SaveVideo which
  # emits under "videos" — still covered.
  type: image+video+gifs
  # VHS_VideoCombine writes both a silent <prefix>.mp4 and an <prefix>-audio.mp4
  # sidecar. With this flag set, the harvester keeps only the audio variant when
  # one exists — otherwise the client would receive two near-duplicate URLs.
  vhs_sidecar_filter: true
